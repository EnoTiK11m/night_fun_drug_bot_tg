name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check dependencies
        run: python -m pip check

      - name: Compile Python files
        run: python -m py_compile bot.py database.py api_handler.py config.py bot_delivery.py bot_features.py bot_media.py bot_formatting.py bot_keyboards.py bot_state.py tag_translation.py

      - name: Run tests
        run: python -m unittest discover -s tests -v
